<!DOCTYPE html>
<html lang="me">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Мали Трг · Brunch & Pizza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     БРЕНД  «МАЛИ ТРГ»  ·  LUX DARK
     ============================================================ */
  :root{
    --bg:        #0a0a0b;   /* crna pozadina */
    --bg-2:      #141416;   /* kartice */
    --bg-3:      #1c1c20;   /* hover */
    --line:      #2b2b31;   /* tanke linije */
    --line-2:    #3a3a42;
    --cream:     #f4efe2;   /* glavni tekst */
    --cream-soft:#e7dfcb;
    --muted:     #9a978f;   /* sporedni tekst */
    --gold:      #c9a86a;   /* mesingani akcenat */
    --gold-soft: #e3cd9b;
    --green:     #2c5345;   /* brend zelena (suptilni akcenat) */
    --green-glow:#1c3a30;
    --side-w: 104px;
    --header-h: 66px;
    --pad: 44px;           /* glavni horizontalni padding */
    --font-display: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    --font-body: 'Jost', 'Segoe UI', Helvetica, Arial, sans-serif;
    --ease: cubic-bezier(.22,.61,.36,1);
  }

  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:var(--font-body);
    background:var(--bg);
    color:var(--cream);
    overflow:hidden; user-select:none;
  }
  ::selection{background:var(--gold); color:#000;}

  .app{display:flex; height:100vh; width:100vw;
    background:
      radial-gradient(140% 90% at 100% -10%, rgba(44,83,69,.20), transparent 55%),
      radial-gradient(120% 80% at -10% 110%, rgba(201,168,106,.07), transparent 50%),
      var(--bg);
  }

  /* ---------- JEZICI (u headeru, desno) ---------- */
  .langs{display:flex; align-items:center; gap:6px;
    animation:fadeDown .7s .05s var(--ease) both;}
  .lang-btn{
    padding:7px 12px; border-radius:10px;
    border:1px solid transparent; background:transparent;
    color:var(--muted); font-family:var(--font-display);
    font-size:18px; font-weight:600; letter-spacing:1px; cursor:pointer;
    transition:color .3s var(--ease), background .3s var(--ease), transform .25s var(--ease), box-shadow .3s var(--ease);
  }
  .lang-btn:hover{color:var(--cream); background:var(--bg-3); transform:translateY(-1px);}
  .lang-btn.active{
    color:#1a140a; background:linear-gradient(160deg,var(--gold-soft),var(--gold));
    box-shadow:0 6px 18px rgba(201,168,106,.26);
  }

  .main{flex:1; display:flex; flex-direction:column; min-width:0;}

  /* Header */
  header{
    height:var(--header-h); flex:0 0 var(--header-h);
    display:flex; align-items:center; gap:18px; padding:0 var(--pad);
    border-bottom:1px solid var(--line);
    position:relative; z-index:20;
    animation:fadeDown .6s var(--ease) both;
  }
  header::after{content:""; position:absolute; left:var(--pad); right:var(--pad); bottom:-1px; height:1px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent); opacity:.3;}
  .brand{display:flex; align-items:center; gap:14px;}
  .brand .logo-img{height:48px;width:48px;object-fit:contain;
    filter:drop-shadow(0 4px 12px rgba(0,0,0,.55)); animation:floatIn .7s var(--ease) both;}
  .brand .badge{height:48px;width:48px;flex:0 0 48px;display:none;}
  .brand .word{display:flex; flex-direction:column; line-height:1;}
  .brand .word .nm{font-family:var(--font-display); font-weight:600; font-size:22px;
    letter-spacing:2px; color:var(--cream); text-transform:uppercase;}
  .brand .word .sub{font-family:var(--font-body); font-weight:300; font-size:9px;
    letter-spacing:5px; color:var(--gold-soft); margin-top:5px; text-transform:uppercase;}
  header .spacer{flex:1;}
  .hright{display:flex; align-items:center; gap:12px;}
  .hbtns{display:flex; align-items:center; gap:12px;}
  .hbtn{width:42px;height:42px;border-radius:11px;border:1px solid var(--line);
    background:transparent;color:var(--muted);cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:color .3s var(--ease),background .3s var(--ease),border-color .3s var(--ease),transform .25s var(--ease);}
  .hbtn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
  .hbtn:hover{color:var(--cream);background:var(--bg-3);border-color:var(--line-2);transform:translateY(-1px);}

  /* Kategorije */
  .cats{
    display:flex; gap:9px; padding:12px var(--pad);
    overflow-x:auto; border-bottom:1px solid var(--line);
    scrollbar-width:none; -webkit-overflow-scrolling:touch;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 34px,#000 calc(100% - 34px),transparent);
            mask-image:linear-gradient(90deg,transparent,#000 34px,#000 calc(100% - 34px),transparent);
    animation:fadeUp .7s .05s var(--ease) both;
  }
  .cats::-webkit-scrollbar{display:none;}
  .cat{
    flex:0 0 auto; min-width:104px;
    padding:11px 16px 10px; border-radius:13px;
    border:1px solid var(--line); background:rgba(255,255,255,.012);
    color:var(--muted); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:9px;
    transition:color .3s var(--ease), background .3s var(--ease),
               border-color .3s var(--ease), transform .3s var(--ease), box-shadow .3s var(--ease);
  }
  .cat svg{width:23px;height:23px;stroke:currentColor;fill:none;stroke-width:1.25;
    transition:transform .35s var(--ease);}
  .cat .lab{font-family:var(--font-body); font-weight:400; font-size:10.5px;
    letter-spacing:1.6px; text-transform:uppercase; white-space:nowrap;}
  .cat:hover{color:var(--cream); background:var(--bg-3); transform:translateY(-3px);
    border-color:var(--line-2);}
  .cat:hover svg{transform:scale(1.12) translateY(-1px);}
  .cat.active{
    color:#1a140a; border-color:var(--gold-soft);
    background:linear-gradient(160deg,var(--gold-soft),var(--gold));
    box-shadow:0 8px 26px rgba(201,168,106,.22);
  }
  .cat.active svg{transform:scale(1.06);}

  /* Naslov sekcije */
  .section-head{padding:16px var(--pad) 4px; display:flex; flex-direction:column; align-items:center; gap:9px; text-align:center;}
  .section-head h2{
    font-family:var(--font-display); font-weight:600; font-size:30px;
    letter-spacing:5px; text-transform:uppercase; color:var(--cream); line-height:1;
  }
  .ornament{display:flex; align-items:center; gap:16px; color:var(--gold);}
  .ornament .dot{width:5px;height:5px;border:1px solid var(--gold);transform:rotate(45deg);}
  .ornament .ln{height:1px; background:linear-gradient(90deg,transparent,var(--gold)); width:0; transition:width .6s .15s var(--ease);}
  .ornament .ln.r{background:linear-gradient(90deg,var(--gold),transparent);}
  .section-head.in .ornament .ln{width:52px;}
  .section-head .txt{font-family:var(--font-body); font-weight:300; font-size:11px;
    letter-spacing:4px; color:var(--gold-soft); text-transform:uppercase;}
  .section-head.in h2{animation:titleIn .6s var(--ease) both;}

  /* Grid */
  .scroll{flex:1; overflow-y:auto; padding:18px var(--pad) 70px; scroll-behavior:smooth;}
  .scroll::-webkit-scrollbar{width:9px;}
  .scroll::-webkit-scrollbar-track{background:transparent;}
  .scroll::-webkit-scrollbar-thumb{background:var(--line-2); border-radius:8px; border:3px solid var(--bg);}
  .scroll::-webkit-scrollbar-thumb:hover{background:var(--gold);}

  .subhead{
    grid-column:1/-1; display:flex; align-items:center; gap:18px;
    margin:26px 2px 4px; color:var(--gold-soft);
    animation:fadeUp .5s var(--ease) both;
  }
  .subhead:first-child{margin-top:0;}
  .subhead .dot{width:5px;height:5px;border:1px solid var(--gold);transform:rotate(45deg);flex:0 0 auto;}
  .subhead span{font-family:var(--font-display); font-weight:600; font-size:26px;
    letter-spacing:3px; text-transform:uppercase; white-space:nowrap;}
  .subhead::after{content:""; flex:1; height:1px; background:linear-gradient(90deg,var(--line-2),transparent);}

  .grid{display:grid; grid-template-columns:repeat(5,1fr); gap:18px;}

  .card{
    position:relative;
    background:linear-gradient(165deg,var(--bg-2),#0e0e10);
    border:1px solid var(--line); border-radius:18px; overflow:hidden;
    display:flex; flex-direction:column;
    transition:transform .4s var(--ease), border-color .4s var(--ease), box-shadow .4s var(--ease);
    animation:cardIn .55s var(--ease) both;
  }
  .card:hover{transform:translateY(-6px); border-color:var(--gold);
    box-shadow:0 26px 50px rgba(0,0,0,.55), 0 0 0 1px rgba(201,168,106,.25);}

  .card .photo{
    height:150px; position:relative; overflow:hidden;
    border-bottom:1px solid var(--line);
  }
  .card .imgz{position:absolute; inset:0; background-size:cover; background-position:center;
    transition:transform .6s var(--ease);}
  .card:hover .imgz{transform:scale(1.07);}
  .card .photo.placeholder .imgz{
    background:
      radial-gradient(90% 120% at 50% -20%, rgba(201,168,106,.14), transparent 65%),
      linear-gradient(160deg,#1a322a,#0c0c0d);
  }
  .card .photo .glyph{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; opacity:.45;}
  .card .photo .glyph svg{width:56px;height:56px;stroke:var(--gold-soft);fill:none;stroke-width:.9;}
  .card .photo::after{content:""; position:absolute; inset:0;
    background:linear-gradient(180deg,transparent 45%,rgba(8,8,9,.6));}
  .card .photo .price{
    position:absolute; right:14px; bottom:14px; z-index:2;
    background:rgba(10,10,11,.7); backdrop-filter:blur(6px);
    color:var(--gold-soft); font-family:var(--font-display); font-weight:600;
    font-size:19px; letter-spacing:.5px; padding:6px 14px; border-radius:11px;
    border:1px solid rgba(201,168,106,.4);
    transition:transform .4s var(--ease), background .4s var(--ease);
  }
  .card:hover .photo .price{transform:translateY(-2px) scale(1.04); background:rgba(201,168,106,.95); color:#1a140a; border-color:var(--gold-soft);}

  .card .body{padding:12px 16px 13px; display:flex; flex-direction:column; gap:4px; flex:1;}
  .card .body h3{font-family:var(--font-display); font-weight:600; font-size:22px;
    letter-spacing:.4px; color:var(--cream); line-height:1.04;}
  .card .body .desc{font-family:var(--font-body); font-weight:300; font-size:13px;
    color:var(--muted); line-height:1.28;}
  .card .body .foot{margin-top:2px; padding-top:7px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .card .body .unit{font-family:var(--font-body); font-weight:300; font-size:11.5px;
    letter-spacing:1.5px; color:var(--gold); text-transform:uppercase;}

  /* lista (pića) */
  .list .grid{grid-template-columns:repeat(auto-fill,minmax(420px,1fr)); gap:14px;}
  .list .card{flex-direction:row; align-items:baseline; padding:17px 22px; gap:14px;
    background:linear-gradient(165deg,rgba(20,20,22,.7),rgba(12,12,13,.4));}
  .list .card:hover{transform:translateY(-2px);}
  .list .card .photo{display:none;}
  .list .card .body{padding:0; flex-direction:row; align-items:baseline; gap:12px; width:100%;}
  .list .card .body h3{font-size:21px; white-space:nowrap; flex:0 0 auto;}
  .list .card .body .desc{flex:1; font-size:13px; font-style:italic;
    border-bottom:1px dotted var(--line-2); transform:translateY(-3px); color:#83817a;}
  .list .card .body .foot{margin:0; padding:0; flex:0 0 auto;}
  .list .card .body .unit{display:none;}
  .list .card .body .foot::after{content:attr(data-price); font-family:var(--font-display);
    font-weight:600; font-size:21px; color:var(--gold-soft);}

  .note{grid-column:1/-1; text-align:center; color:var(--muted); font-weight:300;
    font-style:italic; font-size:13px; letter-spacing:1px; margin-top:20px;}
  .card.clickable{cursor:pointer;}

  /* ---------- LIGHTBOX (klik na jelo) ---------- */
  .zoom-ic{position:absolute; left:14px; bottom:14px; z-index:2; width:34px;height:34px;
    display:flex;align-items:center;justify-content:center; border-radius:9px;
    background:rgba(10,10,11,.5); backdrop-filter:blur(6px); color:var(--cream);
    border:1px solid var(--line-2); opacity:0; transform:translateY(6px); font-size:15px;
    transition:opacity .35s var(--ease), transform .35s var(--ease);}
  .card:hover .zoom-ic{opacity:1; transform:translateY(0);}

  .lightbox{position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
    background:rgba(5,5,6,.85); backdrop-filter:blur(14px);
    opacity:0; pointer-events:none; transition:opacity .4s var(--ease);}
  .lightbox.open{opacity:1; pointer-events:auto;}
  .lb-stage{width:min(86vw,760px); max-height:92vh; overflow:auto; scrollbar-width:none;
    transform:translateY(16px) scale(.97); transition:transform .45s var(--ease);}
  .lb-stage::-webkit-scrollbar{display:none;}
  .lightbox.open .lb-stage{transform:none;}
  .lb-imgwrap{position:relative; aspect-ratio:16/10; border-radius:20px; overflow:hidden;
    border:1px solid var(--line-2); box-shadow:0 34px 80px rgba(0,0,0,.6);}
  .lb-img{position:absolute; inset:0; background-size:cover; background-position:center;}
  .lb-img.swap{animation:lbImgIn .5s var(--ease);}
  @keyframes lbImgIn{from{opacity:0; transform:scale(1.05);} to{opacity:1; transform:scale(1);}}
  .lb-imgwrap::after{content:""; position:absolute; inset:0; background:linear-gradient(180deg,transparent 55%,rgba(5,5,6,.5));}
  .lb-price{position:absolute; right:16px; bottom:16px; z-index:2; background:rgba(201,168,106,.96); color:#1a140a;
    font-family:var(--font-display); font-weight:600; font-size:23px; padding:7px 17px; border-radius:13px;}
  .lb-cat{margin-top:22px; font-family:var(--font-body); font-weight:300; font-size:11px; letter-spacing:4px;
    text-transform:uppercase; color:var(--gold-soft); text-align:center;}
  .lb-name{font-family:var(--font-display); font-weight:600; font-size:36px; letter-spacing:.5px;
    color:var(--cream); text-align:center; margin-top:8px; line-height:1.1;}
  .lb-desc{font-family:var(--font-body); font-weight:300; font-size:16px; color:var(--muted);
    text-align:center; margin:13px auto 0; line-height:1.65; font-style:italic; max-width:560px;}
  .lb-foot{display:flex; align-items:center; justify-content:center; gap:18px; margin-top:16px;}
  .lb-unit{font-size:12px; letter-spacing:2px; text-transform:uppercase; color:var(--gold);}
  .lb-count{text-align:center; margin-top:20px; font-family:var(--font-body); font-size:12px; letter-spacing:3px; color:#75736c;}
  .lb-nav{position:fixed; top:50%; transform:translateY(-50%); width:64px;height:64px; border-radius:50%;
    border:1px solid var(--line-2); background:rgba(20,20,22,.55); color:var(--cream); cursor:pointer;
    font-size:32px; line-height:1; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(6px);
    transition:background .3s var(--ease), color .3s var(--ease), transform .3s var(--ease);}
  .lb-nav:hover{background:var(--gold); color:#1a140a; border-color:var(--gold-soft); transform:translateY(-50%) scale(1.06);}
  .lb-nav.prev{left:max(24px,calc(50vw - 472px));}
  .lb-nav.next{right:max(24px,calc(50vw - 472px));}
  .lb-close{position:fixed; top:26px; right:30px; width:52px;height:52px; border-radius:50%;
    border:1px solid var(--line-2); background:rgba(20,20,22,.55); color:var(--cream); cursor:pointer;
    font-size:24px; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(6px);
    transition:background .3s var(--ease), color .3s var(--ease), transform .4s var(--ease);}
  .lb-close:hover{background:var(--gold); color:#1a140a; transform:rotate(90deg);}

  /* ---------- SLIDESHOW (play) ---------- */
  .slideshow{position:fixed; inset:0; z-index:200; background:#000; display:none; cursor:pointer; overflow:hidden;}
  .slideshow.on{display:block;}
  .show-img{position:absolute; inset:0; background-size:cover; background-position:center; transform-origin:center;}
  .show-img.anim{animation:kenburns 5.4s linear both;}
  @keyframes kenburns{0%{opacity:0; transform:scale(1.04);} 10%{opacity:1;} 100%{opacity:1; transform:scale(1.14);}}
  .show-grad{position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(0deg, rgba(0,0,0,.9) 0%, rgba(0,0,0,.55) 26%, rgba(0,0,0,0) 52%);}
  .show-logo{position:absolute; top:5vh; left:50%; transform:translateX(-50%); height:9vh; opacity:.9;
    filter:drop-shadow(0 4px 16px rgba(0,0,0,.6));}
  .show-info{position:absolute; left:0; right:0; bottom:9vh; text-align:center; padding:0 8vw; z-index:2;}
  .show-info.anim{animation:showInfoIn .9s var(--ease) both;}
  @keyframes showInfoIn{from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);}}
  .show-cat{font-family:var(--font-body); font-weight:300; font-size:1.6vh; letter-spacing:5px;
    text-transform:uppercase; color:var(--gold-soft); margin-bottom:1.4vh;}
  .show-name{font-family:var(--font-display); font-weight:600; font-size:6vh; letter-spacing:1px;
    color:var(--cream); line-height:1.02;}
  .show-desc{font-family:var(--font-body); font-weight:300; font-size:2.3vh; font-style:italic;
    color:#cfc9bd; margin:1.6vh auto 0; max-width:60vw; line-height:1.45;}
  .show-price{font-family:var(--font-display); font-weight:600; font-size:4.4vh; color:var(--gold-soft); margin-top:2vh;}
  .show-hint{position:absolute; bottom:3vh; left:0; right:0; text-align:center; z-index:2;
    font-family:var(--font-body); font-weight:300; font-size:1.5vh; letter-spacing:3px; text-transform:uppercase;
    color:#7d7a72; animation:hintPulse 2.4s ease-in-out infinite;}
  @keyframes hintPulse{0%,100%{opacity:.35;} 50%{opacity:.85;}}

  /* ---------- ANIMACIJE ---------- */
  @keyframes cardIn{from{opacity:0; transform:translateY(20px) scale(.985);} to{opacity:1; transform:translateY(0) scale(1);}}
  @keyframes fadeDown{from{opacity:0; transform:translateY(-14px);} to{opacity:1; transform:translateY(0);}}
  @keyframes fadeUp{from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);}}
  @keyframes floatIn{from{opacity:0; transform:translateY(8px) scale(.96);} to{opacity:1; transform:translateY(0) scale(1);}}
  @keyframes titleIn{from{opacity:0; letter-spacing:16px; transform:translateY(6px);} to{opacity:1; letter-spacing:8px; transform:translateY(0);}}

  @media (max-width:760px){
    :root{--header-h:auto; --pad:16px;}
    header{flex-wrap:wrap; gap:10px 14px; padding:14px 16px;}
    .hbtns{position:absolute; top:14px; right:16px; z-index:30;}
    .hright{width:100%;}
    .brand{gap:14px;}
    .brand .logo-img,.brand .badge{height:54px;width:54px;flex-basis:54px;}
    .brand .word .nm{font-size:24px; letter-spacing:1.5px;}
    .brand .word .sub{font-size:9px; letter-spacing:4px; margin-top:6px;}
    .section-head{padding-top:26px;}
    .section-head h2{font-size:30px; letter-spacing:4px;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px;}
    .card .photo{height:112px;}
    .card .body h3{font-size:19px;}
    .list .grid{grid-template-columns:1fr;}
    .lang-btn{padding:7px 11px; font-size:17px;}
    .lb-name{font-size:25px;} .lb-desc{font-size:14px;}
    .lb-nav{top:auto; bottom:24px; transform:none; width:52px; height:52px; font-size:27px;}
    .lb-nav:hover{transform:none;}
    .lb-nav.prev{left:20px;} .lb-nav.next{right:20px;}
    .lb-close{top:14px; right:14px; width:44px;height:44px;}
    .lb-stage{width:92vw; padding-bottom:78px;}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important;}}
</style>
</head>
<body>
<div class="app">
  <div class="main">

    <header>
      <div class="brand">
        <img class="logo-img" src="assets/logo.png" alt="Мали Трг — Brunch & Pizza"
             onerror="this.style.display='none'; document.getElementById('badge').style.display='block';">
        <svg id="badge" class="badge" viewBox="0 0 200 200">
          <defs>
            <path id="arcTop" d="M30,100 a70,70 0 0,1 140,0"/>
            <path id="arcBot" d="M34,100 a66,66 0 0,0 132,0"/>
          </defs>
          <circle cx="100" cy="100" r="98" fill="none" stroke="#f4efe2" stroke-width="1.2" opacity=".5"/>
          <text fill="#f4efe2" font-family="Cormorant Garamond, serif" font-weight="600" font-size="30" letter-spacing="6" text-anchor="middle"><textPath href="#arcTop" startOffset="50%">МАЛИ ТРГ</textPath></text>
          <text fill="#f4efe2" font-family="Jost, sans-serif" font-size="14" letter-spacing="6" text-anchor="middle"><textPath href="#arcBot" startOffset="50%">BRUNCH &amp; PIZZA</textPath></text>
          <g stroke="#f4efe2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="100" cy="103" r="40"/><path d="M82 80v18a4 4 0 0 0 8 0V80M86 80v46"/>
            <path d="M104 122l14-36a30 30 0 0 1 14 14z"/>
          </g>
        </svg>
        <div class="word">
          <span class="nm">Мали&nbsp;Трг</span>
          <span class="sub">Brunch &amp; Pizza</span>
        </div>
      </div>
      <div class="spacer"></div>
      <div class="hright">
        <nav class="langs" id="langbar"></nav>
        <div class="hbtns">
          <button class="hbtn" id="playBtn" onclick="startShow()" aria-label="Slideshow" title="Slideshow">
            <svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M8 5.14v13.72a1 1 0 0 0 1.54.84l10.29-6.86a1 1 0 0 0 0-1.68L9.54 4.3A1 1 0 0 0 8 5.14z"/></svg>
          </button>
          <button class="hbtn" id="fsBtn" onclick="toggleFS()" aria-label="Fullscreen"></button>
        </div>
      </div>
    </header>

    <div class="cats" id="cats"></div>

    <div class="section-head" id="sectionHead">
      <h2 id="secTitle"></h2>
      <div class="ornament"><span class="ln"></span><span class="dot"></span><span class="txt" id="secCount"></span><span class="dot"></span><span class="ln r"></span></div>
    </div>

    <div class="scroll" id="scroll">
      <div class="grid" id="grid"></div>
    </div>

  </div>
</div>

<!-- ============ LIGHTBOX ============ -->
<div class="lightbox" id="lb" onclick="if(event.target===this)closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()" aria-label="Zatvori">&times;</button>
  <button class="lb-nav prev" onclick="lbNav(-1)" aria-label="Prethodno">&lsaquo;</button>
  <button class="lb-nav next" onclick="lbNav(1)" aria-label="Sljedeće">&rsaquo;</button>
  <div class="lb-stage">
    <div class="lb-imgwrap"><div class="lb-img" id="lbImg"></div><span class="lb-price" id="lbPrice"></span></div>
    <div class="lb-cat" id="lbCat"></div>
    <div class="lb-name" id="lbName"></div>
    <div class="lb-desc" id="lbDesc"></div>
    <div class="lb-foot"><span class="lb-unit" id="lbUnit"></span></div>
    <div class="lb-count" id="lbCount"></div>
  </div>
</div>

<!-- ============ SLIDESHOW ============ -->
<div class="slideshow" id="show" onclick="stopShow()">
  <div class="show-img" id="showImg"></div>
  <div class="show-grad"></div>
  <img class="show-logo" src="assets/logo.png" alt="" onerror="this.style.display='none'">
  <div class="show-info" id="showInfo">
    <div class="show-cat" id="showCat"></div>
    <div class="show-name" id="showName"></div>
    <div class="show-desc" id="showDesc"></div>
    <div class="show-price" id="showPrice"></div>
  </div>
  <div class="show-hint">Додирните за мени &middot; Tap for menu</div>
</div>

<script src="data.js"></script>
<script>
/* ===================== JEZICI ===================== */
const LANGS=[{code:"me",lab:"ME"},{code:"en",lab:"EN"},{code:"ru",lab:"RU"},{code:"fr",lab:"FR"},{code:"de",lab:"DE"},{code:"it",lab:"IT"},{code:"es",lab:"ES"}];
const UI={
  me:{loc:"Црна Гора",items:"ставки"},en:{loc:"Montenegro",items:"items"},ru:{loc:"Черногория",items:"позиций"},
  fr:{loc:"Monténégro",items:"plats"},de:{loc:"Montenegro",items:"Gerichte"},it:{loc:"Montenegro",items:"piatti"},es:{loc:"Montenegro",items:"platos"},
};
const CATEGORIES=[
  {id:"breakfast",icon:"coffee",t:{me:"Доручак",en:"Breakfast",ru:"Завтрак",fr:"Petit-déjeuner",de:"Frühstück",it:"Colazione",es:"Desayuno"}},
  {id:"cold",icon:"leaf",t:{me:"Хладна предјела",en:"Cold starters",ru:"Холодные закуски",fr:"Entrées froides",de:"Kalte Vorspeisen",it:"Antipasti freddi",es:"Entrantes fríos"}},
  {id:"hot",icon:"flame",t:{me:"Топла предјела",en:"Hot starters",ru:"Горячие закуски",fr:"Entrées chaudes",de:"Warme Vorspeisen",it:"Antipasti caldi",es:"Entrantes calientes"}},
  {id:"main",icon:"cutlery",t:{me:"Главна јела",en:"Main dishes",ru:"Основные блюда",fr:"Plats principaux",de:"Hauptgerichte",it:"Secondi",es:"Platos principales"}},
  {id:"salads",icon:"salad",t:{me:"Оброк салате",en:"Meal salads",ru:"Салаты",fr:"Salades repas",de:"Salate",it:"Insalate",es:"Ensaladas"}},
  {id:"pizza",icon:"pizza",t:{me:"Пица",en:"Pizza",ru:"Пицца",fr:"Pizza",de:"Pizza",it:"Pizza",es:"Pizza"}},
  {id:"pizzasand",icon:"sandwich",t:{me:"Пица сендвичи",en:"Pizza sandwiches",ru:"Пицца-сэндвичи",fr:"Sandwichs pizza",de:"Pizza-Sandwiches",it:"Panini pizza",es:"Sándwiches de pizza"}},
  {id:"addons",icon:"plus",t:{me:"Додаци",en:"Add-ons",ru:"Добавки",fr:"Suppléments",de:"Beilagen",it:"Aggiunte",es:"Extras"}},
  {id:"cakes",icon:"cake",t:{me:"Колачи",en:"Cakes",ru:"Десерты",fr:"Pâtisseries",de:"Kuchen",it:"Dolci",es:"Pasteles"}},
  {id:"kokteli",icon:"cocktail",t:{me:"Коктели",en:"Cocktails",ru:"Коктейли",fr:"Cocktails",de:"Cocktails",it:"Cocktail",es:"Cócteles"}},
  {id:"coffee",icon:"cup",t:{me:"Кафа",en:"Coffee",ru:"Кофе",fr:"Café",de:"Kaffee",it:"Caffè",es:"Café"}},
  {id:"drinks",icon:"glass",t:{me:"Сокови и пића",en:"Drinks",ru:"Напитки",fr:"Boissons",de:"Getränke",it:"Bevande",es:"Bebidas"}},
  {id:"spirits",icon:"bottle",t:{me:"Жестока пића",en:"Spirits",ru:"Крепкие напитки",fr:"Spiritueux",de:"Spirituosen",it:"Superalcolici",es:"Licores"}},
  {id:"wine",icon:"wine",t:{me:"Винска карта",en:"Wine list",ru:"Винная карта",fr:"Carte des vins",de:"Weinkarte",it:"Carta dei vini",es:"Carta de vinos"}},
];
const GROUPS=(window.MENU_GROUPS)||{};
const ICONS={
  coffee:'<path d="M5 9h10.5v4a4.4 4.4 0 0 1-4.4 4.4H9.4A4.4 4.4 0 0 1 5 13z"/><path d="M15.5 10h2.2a2.3 2.3 0 0 1 0 4.6h-2.2"/><path d="M4.5 20.2h12"/><path d="M8 3.4c-.5 1 .5 1.6 0 2.6M11.4 3.4c-.5 1 .5 1.6 0 2.6"/>',
  leaf:'<path d="M5 19c0-8 6-13.5 14-14 0 8-6 14-14 14z"/><path d="M6 18C10 13.5 13 10.6 17.4 7.6"/>',
  flame:'<path d="M12 3c3 3.4 4.7 5.9 4.7 8.7A4.7 4.7 0 0 1 7.3 12c0-1.4.7-2.7 1.6-3.6.4 1.7 1.4 2.2 1.4 2.2C10.8 8.4 11.2 5.8 12 3z"/>',
  cutlery:'<path d="M3 19h18"/><path d="M5 19a7 7 0 0 1 14 0"/><path d="M12 6.2V4.7"/><circle cx="12" cy="3.7" r=".95"/>',
  salad:'<path d="M3.5 11h17a8.5 8.5 0 0 1-17 0z"/><path d="M6.6 11c.6-3 3-4.6 5.4-4.6S17 8 17.4 11"/><path d="M12 6.4c0-1.5 1-2.5 2.4-2.7"/>',
  pizza:'<path d="M4 6.5l8 13.5 8-13.5a23 23 0 0 0-16 0z"/><circle cx="10" cy="9.5" r=".95"/><circle cx="13.4" cy="12.8" r=".95"/>',
  sandwich:'<path d="M3.5 18.4h17"/><path d="M4.6 18.4L12 6l7.4 12.4z"/><path d="M8.6 15c1.1.9 2.3.9 3.4 0s2.3-.9 3.4 0"/>',
  plus:'<circle cx="12" cy="12" r="8.2"/><path d="M12 8.3v7.4M8.3 12h7.4"/>',
  cake:'<path d="M4 20.4h16v-6.4H4z"/><path d="M4 14c1.5-1.9 3-1.9 4 0s3 1.9 4 0 3-1.9 4 0 3 1.9 4 0"/><path d="M12 5.2v3M9.4 6.2v2M14.6 6.2v2"/>',
  cup:'<path d="M5.6 8.6h9.6v4.4a4.1 4.1 0 0 1-4.1 4.1H9.7A4.1 4.1 0 0 1 5.6 13z"/><path d="M15.2 9.6h2.2a2.3 2.3 0 0 1 0 4.6h-2.2"/><path d="M6 20.4h9"/>',
  glass:'<path d="M6.5 4h11l-1.3 14.2a2 2 0 0 1-2 1.8H9.8a2 2 0 0 1-2-1.8z"/><path d="M7 9h10"/>',
  bottle:'<path d="M10 3.5h4v2.6l1.1 3.2V19a2 2 0 0 1-2 2h-2.2a2 2 0 0 1-2-2V9.3L10 6.1z"/><path d="M9.9 12.2h4.2"/>',
  wine:'<path d="M7 3.5h10c0 5-2 8-5 8s-5-3-5-8z"/><path d="M12 11.5v7M8.2 21h7.6"/>',
  cocktail:'<path d="M4.5 5h15l-7.5 8zM12 13v6M8 21h8"/><path d="M16.4 6l3.1-2.6"/><circle cx="19.7" cy="3" r="1"/>',
  dish:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.2"/>',
};

/* kategorije sa fotografijama + auto-dodjela placeholder slika */
const PHOTO_CATS=["breakfast","cold","hot","main","salads","pizza","pizzasand","addons","cakes","kokteli"];
(function(){const cnt={};(window.MENU||[]).forEach(x=>{if(PHOTO_CATS.includes(x.cat)){
  cnt[x.cat]=(cnt[x.cat]||0)+1; if(!x._photo)x._photo=x.img||`images/${x.cat}-${cnt[x.cat]}.jpg`;}});})();
const FLAT=(window.MENU||[]).filter(x=>PHOTO_CATS.includes(x.cat));
FLAT.forEach((x,i)=>x._fi=i);

let lang="me", activeCat="breakfast";
const langbar=document.getElementById("langbar"),catsEl=document.getElementById("cats"),
      gridEl=document.getElementById("grid"),scrollEl=document.getElementById("scroll"),
      headEl=document.getElementById("sectionHead");

LANGS.forEach(l=>{const b=document.createElement("button");b.className="lang-btn"+(l.code===lang?" active":"");
  b.textContent=l.lab;b.onclick=()=>{lang=l.code;render();};langbar.appendChild(b);});

function render(){
  document.documentElement.lang=lang;
  [...langbar.querySelectorAll(".lang-btn")].forEach((b,i)=>b.classList.toggle("active",LANGS[i].code===lang));
  document.querySelectorAll("[data-i18n]").forEach(el=>{const k=el.getAttribute("data-i18n");if(UI[lang][k])el.textContent=UI[lang][k];});

  catsEl.innerHTML="";
  CATEGORIES.forEach(c=>{const d=document.createElement("button");
    d.className="cat"+(c.id===activeCat?" active":"");
    d.innerHTML=`<svg viewBox="0 0 24 24">${ICONS[c.icon]||ICONS.dish}</svg><span class="lab">${c.t[lang]||c.t.en}</span>`;
    d.onclick=()=>{activeCat=c.id;render();
      const a=catsEl.querySelector(".cat.active"); if(a)a.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});};
    catsEl.appendChild(d);});

  const cat=CATEGORIES.find(c=>c.id===activeCat);
  const items=(window.MENU||[]).filter(x=>x.cat===activeCat);
  document.getElementById("secTitle").textContent=cat.t[lang]||cat.t.en;
  document.getElementById("secCount").textContent=`${items.length} ${UI[lang].items}`;
  headEl.classList.remove("in"); void headEl.offsetWidth; headEl.classList.add("in");

  const listMode=["coffee","drinks","spirits","wine"].includes(activeCat);
  scrollEl.classList.toggle("list",listMode);

  gridEl.innerHTML="";
  let lastGroup=null;
  items.forEach((x,i)=>{
    if(x.group&&x.group!==lastGroup){lastGroup=x.group;
      const g=GROUPS[x.group];const h=document.createElement("div");h.className="subhead";
      h.innerHTML=`<span class="dot"></span><span>${(g&&(g[lang]||g.en))||x.group}</span>`;
      h.style.animationDelay=(Math.min(i,14)*0.02)+"s"; gridEl.appendChild(h);}
    const t=x.t&&(x.t[lang]||x.t.en||x.t.me)||{};
    const card=document.createElement("div");card.className="card";
    card.style.animationDelay=(Math.min(i,16)*0.035)+"s";
    const ph=x._photo||x.img;
    const photo=listMode?"":`
      <div class="photo ${ph?'':'placeholder'}">
        <div class="imgz" ${ph?`style="background-image:url('${ph}')"`:''}></div>
        ${ph?'':`<span class="glyph"><svg viewBox="0 0 24 24">${ICONS[cat.icon]||ICONS.dish}</svg></span>`}
        <span class="zoom-ic">&#10530;</span>
        <span class="price">${x.price||""}</span>
      </div>`;
    card.innerHTML=`${photo}<div class="body"><h3>${t.n||""}</h3>${t.d?`<div class="desc">${t.d}</div>`:""}
      <div class="foot" data-price="${x.price||""}">${x.unit?`<span class="unit">${x.unit}</span>`:"<span></span>"}</div></div>`;
    if(!listMode && x._fi!=null){card.classList.add("clickable"); card.onclick=()=>openLightbox(x._fi);}
    gridEl.appendChild(card);
  });
  if(!items.length){const n=document.createElement("div");n.className="note";n.textContent="…";gridEl.appendChild(n);}
  scrollEl.scrollTop=0;
}
/* ===================== LIGHTBOX ===================== */
let lbIndex=0;
function openLightbox(i){lbIndex=i; fillLightbox(true); document.getElementById("lb").classList.add("open");}
function closeLightbox(){document.getElementById("lb").classList.remove("open");}
function lbNav(d){lbIndex=(lbIndex+d+FLAT.length)%FLAT.length; fillLightbox(true);}
function fillLightbox(animate){
  const x=FLAT[lbIndex]; if(!x)return;
  const t=x.t&&(x.t[lang]||x.t.en||x.t.me)||{};
  const cat=CATEGORIES.find(c=>c.id===x.cat);
  const img=document.getElementById("lbImg");
  img.style.backgroundImage=`url('${x._photo||x.img||""}')`;
  if(animate){img.classList.remove("swap"); void img.offsetWidth; img.classList.add("swap");}
  document.getElementById("lbCat").textContent=cat?(cat.t[lang]||cat.t.en):"";
  document.getElementById("lbName").textContent=t.n||"";
  const dsc=document.getElementById("lbDesc"); dsc.textContent=t.d||""; dsc.style.display=t.d?"block":"none";
  document.getElementById("lbUnit").textContent=x.unit||"";
  document.getElementById("lbPrice").textContent=x.price||"";
  document.getElementById("lbCount").textContent=`${lbIndex+1} / ${FLAT.length}`;
  if(x.cat!==activeCat){activeCat=x.cat; render();}   // prati kategoriju u pozadini
}
document.addEventListener("keydown",e=>{
  if(!document.getElementById("lb").classList.contains("open"))return;
  if(e.key==="ArrowRight")lbNav(1);
  else if(e.key==="ArrowLeft")lbNav(-1);
  else if(e.key==="Escape")closeLightbox();
});
let _tsx=null,_tsy=null;
document.addEventListener("touchstart",e=>{if(document.getElementById("lb").classList.contains("open")){_tsx=e.touches[0].clientX;_tsy=e.touches[0].clientY;}},{passive:true});
document.addEventListener("touchend",e=>{
  if(_tsx==null)return;
  const dx=e.changedTouches[0].clientX-_tsx, dy=e.changedTouches[0].clientY-_tsy;
  if(Math.abs(dx)>45 && Math.abs(dx)>Math.abs(dy)) lbNav(dx<0?1:-1);
  _tsx=null;_tsy=null;
});

/* ===================== FULLSCREEN ===================== */
const FS_ENTER='<svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M8 21H5a2 2 0 0 1-2-2v-3M16 21h3a2 2 0 0 0 2-2v-3"/></svg>';
const FS_EXIT='<svg viewBox="0 0 24 24"><path d="M8 4v3a2 2 0 0 1-2 2H3M16 4v3a2 2 0 0 0 2 2h3M8 20v-3a2 2 0 0 0-2-2H3M16 20v-3a2 2 0 0 1 2-2h3"/></svg>';
function fsEl(){return document.fullscreenElement||document.webkitFullscreenElement;}
function toggleFS(){
  const d=document.documentElement;
  if(!fsEl()){ (d.requestFullscreen||d.webkitRequestFullscreen||function(){}).call(d); }
  else { (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document); }
}
function updateFSIcon(){
  const b=document.getElementById("fsBtn"); if(!b)return;
  const on=!!fsEl();
  b.innerHTML=on?FS_EXIT:FS_ENTER;
  b.title=on?"Izađi iz fullscreen-a":"Fullscreen";
}
document.addEventListener("fullscreenchange",updateFSIcon);
document.addEventListener("webkitfullscreenchange",updateFSIcon);
updateFSIcon();

/* ===================== SLIDESHOW ===================== */
let showTimer=null, showOrder=[], showPos=0;
function shuffle(arr){const a=arr.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a;}
function startShow(){
  if(!FLAT.length)return;
  showOrder=shuffle(FLAT); showPos=0;
  document.getElementById("show").classList.add("on");
  const d=document.documentElement; if(!fsEl()){(d.requestFullscreen||d.webkitRequestFullscreen||function(){}).call(d);}
  showSlide();
  if(showTimer)clearInterval(showTimer);
  showTimer=setInterval(nextSlide,5000);
}
function nextSlide(){ showPos++; if(showPos>=showOrder.length){showOrder=shuffle(FLAT); showPos=0;} showSlide(); }
function showSlide(){
  const x=showOrder[showPos]; if(!x)return;
  const t=x.t&&(x.t[lang]||x.t.en||x.t.me)||{};
  const cat=CATEGORIES.find(c=>c.id===x.cat);
  const img=document.getElementById("showImg");
  img.style.backgroundImage=`url('${x._photo||x.img||""}')`;
  img.classList.remove("anim"); void img.offsetWidth; img.classList.add("anim");
  document.getElementById("showCat").textContent=cat?(cat.t[lang]||cat.t.en):"";
  document.getElementById("showName").textContent=t.n||"";
  const sd=document.getElementById("showDesc"); sd.textContent=t.d||""; sd.style.display=t.d?"block":"none";
  document.getElementById("showPrice").textContent=x.price||"";
  const info=document.getElementById("showInfo");
  info.classList.remove("anim"); void info.offsetWidth; info.classList.add("anim");
}
function stopShow(){
  if(showTimer){clearInterval(showTimer); showTimer=null;}
  document.getElementById("show").classList.remove("on");
}
document.addEventListener("keydown",e=>{
  if(document.getElementById("show").classList.contains("on")){ stopShow(); }
});

document.addEventListener("DOMContentLoaded",render);
render();
</script>
</body>
</html>
